services:
  - type: web
    name: mira-backend
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERVICE_ACCOUNT_JSON
        sync: false
